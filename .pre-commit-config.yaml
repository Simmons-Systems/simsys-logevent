# See https://pre-commit.com for usage and https://pre-commit.com/hooks.html for more hooks.
#
# Node-only repo. Language-agnostic hygiene only — TS/lint runs in CI via vitest.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
