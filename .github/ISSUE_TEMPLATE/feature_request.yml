name: Feature request
description: Suggest a new metric, a new framework, or an API improvement
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! If you're proposing a new metric or label, please fill in the cardinality section — see [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md).

  - type: textarea
    id: problem
    attributes:
      label: What you're trying to do
      description: The user-facing problem.
      placeholder: "I want to alert when my batch processor's in-flight count exceeds N, and I don't see a metric for that."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        What you'd like the package to provide. For new metrics, include:
        - name (must start with `simsys_`)
        - type (Counter / Gauge / Histogram)
        - labels
        - cardinality bounds
        - where it would be emitted
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What you tried or considered first.

  - type: textarea
    id: cardinality
    attributes:
      label: Cardinality check
      description: |
        If you're proposing a new metric or label, what's the worst-case cardinality?
        How is it bounded? User-controlled free-form strings go through `safe_label()`.
