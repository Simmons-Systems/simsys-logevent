name: Bug report
description: Something is broken or behaves unexpectedly
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report! Please fill out the sections below so the issue can be reproduced.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: What you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduce
      description: A minimal example — ideally a ~20-line FastAPI/Flask app + the curl commands or the pytest invocation that fails.
      render: python
      placeholder: |
        # paste minimal repro here
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: simsys-metrics version / commit
      description: "`pip show simsys-metrics | grep Version` or the commit SHA you installed from."
      placeholder: "v0.1.1 or a1b2c3d"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: "`python --version`"
      placeholder: "3.12.5"
    validations:
      required: true

  - type: dropdown
    id: framework
    attributes:
      label: Framework
      options:
        - FastAPI
        - Flask
        - Other / not framework-specific
    validations:
      required: true

  - type: input
    id: framework-version
    attributes:
      label: Framework version
      placeholder: "fastapi 0.115.0 / flask 3.0.3 / n/a"

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Linux / macOS / Windows"

  - type: input
    id: upstream-versions
    attributes:
      label: Relevant upstream versions
      description: prometheus_client, prometheus-fastapi-instrumentator, etc.

  - type: textarea
    id: metrics-output
    attributes:
      label: Metrics output (if relevant)
      description: Paste the relevant lines from `GET /metrics` or the pytest failure.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Stack trace, logs, anything else that might help.
